<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roblox Style 3D</title>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #87ceeb;
      font-family: Arial, sans-serif;
    }

    #renderCanvas {
      width: 100%;
      height: 100%;
      touch-action: none;
      display: block;
      outline: none;
    }

    #menu {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, #70b7ff, #a7dcff);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }

    #menuBox {
      width: min(90vw, 430px);
      background: rgba(0,0,0,0.35);
      color: white;
      padding: 28px;
      border-radius: 22px;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
      backdrop-filter: blur(6px);
    }

    #menuBox h1 {
      font-size: 42px;
      margin: 0 0 10px;
      letter-spacing: 1px;
    }

    #menuBox p {
      opacity: 0.95;
      line-height: 1.5;
    }

    #playBtn {
      margin-top: 18px;
      border: none;
      border-radius: 14px;
      padding: 14px 28px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      background: #00c853;
      color: white;
    }

    #playBtn:hover {
      background: #00b248;
    }

    #hud {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 10;
      color: white;
      background: rgba(0,0,0,0.4);
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.45;
      max-width: 280px;
      user-select: none;
    }

    #crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 12px;
      height: 12px;
      margin-left: -6px;
      margin-top: -6px;
      z-index: 9;
      pointer-events: none;
    }

    #crosshair::before,
    #crosshair::after {
      content: "";
      position: absolute;
      background: white;
      border-radius: 10px;
    }

    #crosshair::before {
      left: 5px;
      top: 0;
      width: 2px;
      height: 12px;
    }

    #crosshair::after {
      left: 0;
      top: 5px;
      width: 12px;
      height: 2px;
    }

    #bottomBar {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(0,0,0,0.35);
      color: white;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="menu">
    <div id="menuBox">
      <h1>ROBLOX STYLE</h1>
      <p>
        Mini jeu 3D inspiré de Roblox<br>
        Clique sur jouer puis clique dans la scène
      </p>
      <button id="playBtn">JOUER</button>
    </div>
  </div>

  <div id="hud">
    <b>Roblox Style 3D</b><br>
    Pièces : <span id="coins">0</span><br>
    Checkpoint : <span id="checkpointText">Spawn</span><br>
    <br>
    ZQSD / WASD = bouger<br>
    Espace = sauter<br>
    Shift = courir<br>
    R = respawn
  </div>

  <div id="crosshair"></div>

  <div id="bottomBar">
    Obby + map + pièces + checkpoints
  </div>

  <canvas id="renderCanvas"></canvas>

  <script>
    const canvas = document.getElementById("renderCanvas");
    const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer: true, stencil: true });
    const menu = document.getElementById("menu");
    const playBtn = document.getElementById("playBtn");
    const coinsText = document.getElementById("coins");
    const checkpointText = document.getElementById("checkpointText");

    let gameStarted = false;

    const createScene = function () {
      const scene = new BABYLON.Scene(engine);
      scene.clearColor = new BABYLON.Color4(0.53, 0.81, 0.98, 1);

      const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
      light.intensity = 0.95;

      const sun = new BABYLON.DirectionalLight("sun", new BABYLON.Vector3(-0.5, -1, -0.2), scene);
      sun.position = new BABYLON.Vector3(20, 40, 20);
      sun.intensity = 0.75;

      const cameraRoot = new BABYLON.TransformNode("cameraRoot", scene);
      cameraRoot.position = new BABYLON.Vector3(0, 4, -8);

      const camera = new BABYLON.FreeCamera("camera", new BABYLON.Vector3(0, 5, -10), scene);
      camera.attachControl(canvas, true);
      camera.inputs.clear();
      camera.minZ = 0.1;
      camera.fov = 1.1;
      camera.parent = cameraRoot;
      camera.setTarget(BABYLON.Vector3.Zero());

      // Skybox
      const skybox = BABYLON.MeshBuilder.CreateBox("skyBox", { size: 1000 }, scene);
      const skyMat = new BABYLON.StandardMaterial("skyMat", scene);
      skyMat.backFaceCulling = false;
      skyMat.disableLighting = true;
      skyMat.diffuseColor = new BABYLON.Color3(0.53, 0.81, 0.98);
      skyMat.specularColor = BABYLON.Color3.Black();
      skybox.material = skyMat;

      // Ground
      const ground = BABYLON.MeshBuilder.CreateGround("ground", { width: 280, height: 280 }, scene);
      const groundMat = new BABYLON.StandardMaterial("groundMat", scene);
      groundMat.diffuseColor = new BABYLON.Color3(0.33, 0.78, 0.43);
      ground.material = groundMat;
      ground.checkCollisions = true;

      // Path
      const path = BABYLON.MeshBuilder.CreateBox("path", { width: 16, height: 0.4, depth: 220 }, scene);
      path.position.y = 0.2;
      const pathMat = new BABYLON.StandardMaterial("pathMat", scene);
      pathMat.diffuseColor = new BABYLON.Color3(0.45, 0.45, 0.48);
      path.material = pathMat;
      path.checkCollisions = true;

      // Player
      const player = new BABYLON.TransformNode("player", scene);

      const bodyMat = new BABYLON.StandardMaterial("bodyMat", scene);
      bodyMat.diffuseColor = new BABYLON.Color3(0.1, 0.4, 0.95);

      const limbMat = new BABYLON.StandardMaterial("limbMat", scene);
      limbMat.diffuseColor = new BABYLON.Color3(0.08, 0.22, 0.65);

      const skinMat = new BABYLON.StandardMaterial("skinMat", scene);
      skinMat.diffuseColor = new BABYLON.Color3(1, 0.82, 0.62);

      const torso = BABYLON.MeshBuilder.CreateBox("torso", { width: 1.4, height: 1.7, depth: 0.8 }, scene);
      torso.position.y = 2.2;
      torso.material = bodyMat;
      torso.parent = player;

      const head = BABYLON.MeshBuilder.CreateBox("head", { size: 0.95 }, scene);
      head.position.y = 3.55;
      head.material = skinMat;
      head.parent = player;

      const armL = BABYLON.MeshBuilder.CreateBox("armL", { width: 0.4, height: 1.3, depth: 0.4 }, scene);
      armL.position.set(-1.0, 2.2, 0);
      armL.material = limbMat;
      armL.parent = player;

      const armR = armL.clone("armR");
      armR.position.x = 1.0;
      armR.parent = player;

      const legL = BABYLON.MeshBuilder.CreateBox("legL", { width: 0.45, height: 1.4, depth: 0.45 }, scene);
      legL.position.set(-0.35, 0.85, 0);
      legL.material = limbMat;
      legL.parent = player;

      const legR = legL.clone("legR");
      legR.position.x = 0.35;
      legR.parent = player;

      player.position = new BABYLON.Vector3(0, 0, 10);

      // World
      const colliders = [];
      const coins = [];
      const checkpoints = [];
      let coinCount = 0;
      let respawnPoint = new BABYLON.Vector3(0, 0, 10);
      let checkpointName = "Spawn";

      function addCollider(mesh) {
        mesh.checkCollisions = true;
        colliders.push(mesh);
      }

      function createBlock(x, y, z, w, h, d, color) {
        const box = BABYLON.MeshBuilder.CreateBox("block", {
          width: w,
          height: h,
          depth: d
        }, scene);

        box.position.set(x, y, z);
        const mat = new BABYLON.StandardMaterial("mat" + Math.random(), scene);
        mat.diffuseColor = BABYLON.Color3.FromHexString(color);
        box.material = mat;
        addCollider(box);
        return box;
      }

      function createTree(x, z) {
        const trunk = BABYLON.MeshBuilder.CreateCylinder("trunk", {
          diameterTop: 0.7,
          diameterBottom: 0.9,
          height: 3.4
        }, scene);
        trunk.position.set(x, 1.7, z);
        const trunkMat = new BABYLON.StandardMaterial("trunkMat" + Math.random(), scene);
        trunkMat.diffuseColor = new BABYLON.Color3(0.48, 0.28, 0.12);
        trunk.material = trunkMat;

        const leaves = BABYLON.MeshBuilder.CreateSphere("leaves", {
          diameter: 3.2
        }, scene);
        leaves.position.set(x, 4.2, z);
        const leavesMat = new BABYLON.StandardMaterial("leavesMat" + Math.random(), scene);
        leavesMat.diffuseColor = new BABYLON.Color3(0.2, 0.62, 0.33);
        leaves.material = leavesMat;
      }

      function createCoin(x, y, z) {
        const coin = BABYLON.MeshBuilder.CreateCylinder("coin", {
          diameter: 1,
          height: 0.2,
          tessellation: 24
        }, scene);

        coin.position.set(x, y, z);
        coin.rotation.x = Math.PI / 2;

        const mat = new BABYLON.StandardMaterial("coinMat" + Math.random(), scene);
        mat.diffuseColor = new BABYLON.Color3(1, 0.85, 0.1);
        mat.emissiveColor = new BABYLON.Color3(0.4, 0.25, 0.02);
        coin.material = mat;

        coins.push(coin);
        return coin;
      }

      function createCheckpoint(x, y, z, name) {
        const cp = BABYLON.MeshBuilder.CreateBox("checkpoint", {
          width: 3,
          height: 0.5,
          depth: 3
        }, scene);

        cp.position.set(x, y, z);
        const mat = new BABYLON.StandardMaterial("cpMat" + Math.random(), scene);
        mat.diffuseColor = new BABYLON.Color3(1, 0.25, 0.25);
        mat.emissiveColor = new BABYLON.Color3(0.25, 0.03, 0.03);
        cp.material = mat;
        cp.metadata = { checkpointName: name };
        checkpoints.push(cp);
        return cp;
      }

      // Decor
      for (let i = 0; i < 22; i++) {
        createTree(-28 - Math.random() * 35, -110 + Math.random() * 220);
        createTree(28 + Math.random() * 35, -110 + Math.random() * 220);
      }

      for (let i = 0; i < 18; i++) {
        const side = i % 2 === 0 ? -1 : 1;
        const z = -95 + i * 11;
        createBlock(side * 23, 4, z, 10, 8, 10, side === -1 ? "#ffc107" : "#9c6bff");
      }

      // Obby
      createBlock(0, 1, -18, 4, 2, 4, "#ff4d4d");
      createBlock(0, 3, -28, 4, 2, 4, "#ff9800");
      createBlock(5, 5, -38, 4, 2, 4, "#ffeb3b");
      createBlock(-5, 7, -48, 4, 2, 4, "#4caf50");
      createBlock(0, 9, -58, 4, 2, 4, "#00bcd4");
      createBlock(7, 11, -68, 4, 2, 4, "#3f51b5");
      createBlock(0, 13, -78, 10, 2, 10, "#e91e63");

      createCheckpoint(0, 14.4, -78, "Obby Top");

      createCoin(0, 2.6, -18);
      createCoin(0, 4.6, -28);
      createCoin(5, 6.6, -38);
      createCoin(-5, 8.6, -48);
      createCoin(0, 10.6, -58);
      createCoin(7, 12.6, -68);
      createCoin(0, 14.9, -78);

      // Extra platforms
      createBlock(20, 2, 20, 6, 4, 6, "#795548");
      createBlock(30, 4, 12, 6, 4, 6, "#8bc34a");
      createBlock(40, 7, 4, 8, 4, 8, "#03a9f4");
      createCheckpoint(40, 9.2, 4, "Tower");

      createCoin(20, 5, 20);
      createCoin(30, 7, 12);
      createCoin(40, 10, 4);

      // Inputs
      const input = {
        forward: false,
        backward: false,
        left: false,
        right: false,
        run: false,
        jump: false
      };

      let yaw = 0;
      let pitch = 0;
      let velocityY = 0;
      let isGrounded = false;
      const gravity = 0.018;
      const jumpPower = 0.35;
      const walkSpeed = 0.13;
      const runSpeed = 0.21;

      const keyDown = (e) => {
        const k = e.key.toLowerCase();
        if (k === "z" || k === "w") input.forward = true;
        if (k === "s") input.backward = true;
        if (k === "q" || k === "a") input.left = true;
        if (k === "d") input.right = true;
        if (k === "shift") input.run = true;
        if (e.code === "Space") input.jump = true;

        if (k === "r") {
          player.position.copyFrom(respawnPoint);
          velocityY = 0;
        }
      };

      const keyUp = (e) => {
        const k = e.key.toLowerCase();
        if (k === "z" || k === "w") input.forward = false;
        if (k === "s") input.backward = false;
        if (k === "q" || k === "a") input.left = false;
        if (k === "d") input.right = false;
        if (k === "shift") input.run = false;
        if (e.code === "Space") input.jump = false;
      };

      window.addEventListener("keydown", keyDown);
      window.addEventListener("keyup", keyUp);

      canvas.addEventListener("click", async () => {
        if (!gameStarted) return;
        try {
          await canvas.requestPointerLock?.();
        } catch (err) {}
      });

      document.addEventListener("mousemove", (e) => {
        if (document.pointerLockElement !== canvas) return;
        yaw += e.movementX * 0.0025;
        pitch += e.movementY * 0.0017;
        pitch = Math.max(-0.8, Math.min(0.55, pitch));
      });

      function playerCenter() {
        return new BABYLON.Vector3(player.position.x, player.position.y + 2, player.position.z);
      }

      function updateCoins() {
        for (let i = coins.length - 1; i >= 0; i--) {
          const coin = coins[i];
          if (!coin || coin.isDisposed()) continue;

          coin.rotation.z += 0.08;
          coin.position.y += Math.sin(performance.now() * 0.003 + i) * 0.003;

          const dist = BABYLON.Vector3.Distance(playerCenter(), coin.position);
          if (dist < 1.4) {
            coin.dispose();
            coins.splice(i, 1);
            coinCount++;
            coinsText.textContent = coinCount;
          }
        }
      }

      function updateCheckpoints() {
        for (const cp of checkpoints) {
          const dist = BABYLON.Vector3.Distance(player.position, cp.position);
          if (dist < 2.2) {
            respawnPoint = new BABYLON.Vector3(cp.position.x, cp.position.y + 0.4, cp.position.z);
            checkpointName = cp.metadata.checkpointName;
            checkpointText.textContent = checkpointName;

            cp.material.diffuseColor = new BABYLON.Color3(0.2, 1, 0.35);
            cp.material.emissiveColor = new BABYLON.Color3(0.05, 0.25, 0.05);
          }
        }
      }

      function updateAnimation() {
        const moving = input.forward || input.backward || input.left || input.right;
        const t = performance.now() * 0.01;

        if (moving && isGrounded) {
          const swing = Math.sin(t) * 0.7;
          armL.rotation.x = swing;
          armR.rotation.x = -swing;
          legL.rotation.x = -swing;
          legR.rotation.x = swing;
        } else {
          armL.rotation.x *= 0.78;
          armR.rotation.x *= 0.78;
          legL.rotation.x *= 0.78;
          legR.rotation.x *= 0.78;
        }
      }

      scene.onBeforeRenderObservable.add(() => {
        const speed = input.run ? runSpeed : walkSpeed;

        let moveX = 0;
        let moveZ = 0;
        if (input.forward) moveZ += 1;
        if (input.backward) moveZ -= 1;
        if (input.left) moveX -= 1;
        if (input.right) moveX += 1;

        let len = Math.hypot(moveX, moveZ);
        if (len > 0) {
          moveX /= len;
          moveZ /= len;
        }

        const sin = Math.sin(yaw);
        const cos = Math.cos(yaw);

        const worldX = moveX * cos - moveZ * sin;
        const worldZ = moveX * sin + moveZ * cos;

        player.position.x += worldX * speed;
        player.position.z += worldZ * speed;

        if (len > 0) {
          player.rotation.y = Math.atan2(worldX, worldZ);
        }

        if (input.jump && isGrounded) {
          velocityY = jumpPower;
          isGrounded = false;
        }

        velocityY -= gravity;
        player.position.y += velocityY;

        if (player.position.y <= 0) {
          player.position.y = 0;
          velocityY = 0;
          isGrounded = true;
        } else {
          isGrounded = false;
        }

        // simple platform collision from top
        for (const c of colliders) {
          const min = c.getBoundingInfo().boundingBox.minimumWorld;
          const max = c.getBoundingInfo().boundingBox.maximumWorld;

          const px = player.position.x;
          const py = player.position.y;
          const pz = player.position.z;

          const insideX = px > min.x - 0.65 && px < max.x + 0.65;
          const insideZ = pz > min.z - 0.65 && pz < max.z + 0.65;
          const topY = max.y;

          if (insideX && insideZ) {
            if (py >= topY - 0.45 && py <= topY + 0.45 && velocityY <= 0) {
              player.position.y = topY;
              velocityY = 0;
              isGrounded = true;
            }
          }
        }

        // world bounds
        player.position.x = Math.max(-120, Math.min(120, player.position.x));
        player.position.z = Math.max(-120, Math.min(120, player.position.z));

        if (player.position.y < -35) {
          player.position.copyFrom(respawnPoint);
          velocityY = 0;
        }

        // camera
        const cameraDistance = 7;
        const targetY = player.position.y + 3;
        const camX = player.position.x - Math.sin(yaw) * cameraDistance;
        const camZ = player.position.z - Math.cos(yaw) * cameraDistance;
        const camY = targetY + 1.8 + pitch * 6;

        camera.position.set(camX, camY, camZ);
        camera.setTarget(new BABYLON.Vector3(player.position.x, targetY + pitch * 2, player.position.z));

        updateCoins();
        updateCheckpoints();
        updateAnimation();
      });

      return scene;
    };

    const scene = createScene();

    playBtn.addEventListener("click", async () => {
      menu.style.display = "none";
      gameStarted = true;
      try {
        await canvas.requestPointerLock?.();
      } catch (err) {}
    });

    engine.runRenderLoop(() => {
      scene.render();
    });

    window.addEventListener("resize", () => {
      engine.resize();
    });
  </script>
</body>
</html>
