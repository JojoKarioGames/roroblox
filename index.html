<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Roblox Like</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: #87ceeb;
      font-family: Arial, sans-serif;
    }

    #game {
      width: 100vw;
      height: 100vh;
      display: block;
    }

    #ui {
      position: fixed;
      top: 15px;
      left: 15px;
      color: white;
      z-index: 10;
      background: rgba(0,0,0,0.45);
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      backdrop-filter: blur(4px);
    }

    #crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 10px;
      height: 10px;
      margin-left: -5px;
      margin-top: -5px;
      border: 2px solid white;
      border-radius: 50%;
      z-index: 11;
      pointer-events: none;
    }

    #startScreen {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, #4ea1ff, #7fd0ff);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }

    #startBox {
      background: rgba(0,0,0,0.4);
      color: white;
      padding: 28px;
      border-radius: 18px;
      text-align: center;
      width: min(90vw, 420px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    #startBox h1 {
      margin-top: 0;
      font-size: 34px;
    }

    #startBtn {
      margin-top: 16px;
      border: none;
      background: #00c853;
      color: white;
      font-size: 18px;
      font-weight: bold;
      padding: 14px 22px;
      border-radius: 12px;
      cursor: pointer;
    }

    #startBtn:hover {
      background: #00b248;
    }
  </style>
</head>
<body>
  <div id="ui">
    <b>Mini Roblox Like</b><br>
    ZQSD / WASD = bouger<br>
    Espace = sauter<br>
    Clic = verrouiller la souris<br>
    Shift = courir<br>
    R = reset position
  </div>

  <div id="crosshair"></div>

  <div id="startScreen">
    <div id="startBox">
      <h1>ROBLOX STYLE</h1>
      <p>Mini jeu 3D en HTML inspiré de Roblox</p>
      <p>Appuie sur jouer puis clique dans le jeu</p>
      <button id="startBtn">JOUER</button>
    </div>
  </div>

  <canvas id="game"></canvas>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

    const canvas = document.getElementById("game");
    const startScreen = document.getElementById("startScreen");
    const startBtn = document.getElementById("startBtn");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    scene.fog = new THREE.Fog(0x87ceeb, 40, 180);

    const camera = new THREE.PerspectiveCamera(
      75,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );

    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: true
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;

    // Lumières
    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x88aa66, 1.1);
    scene.add(hemiLight);

    const sun = new THREE.DirectionalLight(0xffffff, 1.2);
    sun.position.set(20, 30, 10);
    sun.castShadow = true;
    sun.shadow.mapSize.width = 2048;
    sun.shadow.mapSize.height = 2048;
    scene.add(sun);

    // Sol
    const groundGeo = new THREE.BoxGeometry(200, 2, 200);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x50c878 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.position.set(0, -1, 0);
    ground.receiveShadow = true;
    scene.add(ground);

    // Route centrale
    const pathGeo = new THREE.BoxGeometry(12, 0.2, 180);
    const pathMat = new THREE.MeshStandardMaterial({ color: 0x777777 });
    const path = new THREE.Mesh(pathGeo, pathMat);
    path.position.set(0, 0.05, 0);
    path.receiveShadow = true;
    scene.add(path);

    // Joueur
    const player = new THREE.Group();
    scene.add(player);

    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x1976d2 });
    const headMat = new THREE.MeshStandardMaterial({ color: 0xffd19c });
    const limbMat = new THREE.MeshStandardMaterial({ color: 0x0d47a1 });

    const torso = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.5, 0.7), bodyMat);
    torso.position.y = 2.25;
    torso.castShadow = true;
    player.add(torso);

    const head = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.9, 0.9), headMat);
    head.position.y = 3.5;
    head.castShadow = true;
    player.add(head);

    const armL = new THREE.Mesh(new THREE.BoxGeometry(0.35, 1.2, 0.35), limbMat);
    armL.position.set(-0.85, 2.3, 0);
    armL.castShadow = true;
    player.add(armL);

    const armR = new THREE.Mesh(new THREE.BoxGeometry(0.35, 1.2, 0.35), limbMat);
    armR.position.set(0.85, 2.3, 0);
    armR.castShadow = true;
    player.add(armR);

    const legL = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.3, 0.4), limbMat);
    legL.position.set(-0.3, 0.85, 0);
    legL.castShadow = true;
    player.add(legL);

    const legR = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.3, 0.4), limbMat);
    legR.position.set(0.3, 0.85, 0);
    legR.castShadow = true;
    player.add(legR);

    player.position.set(0, 0, 8);

    // Caméra 3e personne
    let yaw = 0;
    let pitch = -0.25;
    const cameraDistance = 6;
    const cameraHeight = 3.2;

    // Contrôles
    const keys = {};
    let isPointerLocked = false;
    let velocityY = 0;
    let onGround = true;
    const gravity = 0.018;
    const walkSpeed = 0.12;
    const runSpeed = 0.2;
    const jumpPower = 0.33;

    document.addEventListener("keydown", (e) => {
      keys[e.key.toLowerCase()] = true;

      if (e.key.toLowerCase() === "r") {
        player.position.set(0, 0, 8);
        velocityY = 0;
      }
    });

    document.addEventListener("keyup", (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    startBtn.addEventListener("click", () => {
      startScreen.style.display = "none";
      canvas.requestPointerLock();
    });

    canvas.addEventListener("click", () => {
      canvas.requestPointerLock();
    });

    document.addEventListener("pointerlockchange", () => {
      isPointerLocked = document.pointerLockElement === canvas;
    });

    document.addEventListener("mousemove", (e) => {
      if (!isPointerLocked) return;
      yaw -= e.movementX * 0.0022;
      pitch -= e.movementY * 0.0017;
      pitch = Math.max(-1.1, Math.min(0.8, pitch));
    });

    // Plateformes / obby
    const colliders = [];

    function createBlock(x, y, z, w, h, d, color = 0xffffff) {
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, d),
        new THREE.MeshStandardMaterial({ color })
      );
      mesh.position.set(x, y, z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);

      colliders.push({
        mesh,
        minX: x - w / 2,
        maxX: x + w / 2,
        minY: y - h / 2,
        maxY: y + h / 2,
        minZ: z - d / 2,
        maxZ: z + d / 2
      });

      return mesh;
    }

    // Ville / décor simple
    for (let i = 0; i < 16; i++) {
      const side = i % 2 === 0 ? -1 : 1;
      const z = -70 + i * 10;
      createBlock(side * 18, 4, z, 8, 8, 8, side === -1 ? 0xffcc80 : 0xb39ddb);
    }

    // Arbres style simple
    function createTree(x, z) {
      const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.4, 0.5, 3, 8),
        new THREE.MeshStandardMaterial({ color: 0x8b5a2b })
      );
      trunk.position.set(x, 1.5, z);
      trunk.castShadow = true;
      scene.add(trunk);

      const leaves = new THREE.Mesh(
        new THREE.SphereGeometry(1.8, 14, 14),
        new THREE.MeshStandardMaterial({ color: 0x2e8b57 })
      );
      leaves.position.set(x, 4, z);
      leaves.castShadow = true;
      scene.add(leaves);
    }

    for (let i = 0; i < 20; i++) {
      createTree(-28 - Math.random() * 20, -80 + Math.random() * 160);
      createTree(28 + Math.random() * 20, -80 + Math.random() * 160);
    }

    // Obby
    createBlock(0, 1, -18, 4, 2, 4, 0xff5252);
    createBlock(0, 3, -26, 4, 2, 4, 0xff9800);
    createBlock(4, 5, -34, 4, 2, 4, 0xffeb3b);
    createBlock(-4, 7, -42, 4, 2, 4, 0x4caf50);
    createBlock(0, 9, -50, 4, 2, 4, 0x2196f3);
    createBlock(6, 11, -58, 4, 2, 4, 0x673ab7);
    createBlock(0, 13, -66, 8, 2, 8, 0xe91e63);

    // Pièces
    const coins = [];
    function createCoin(x, y, z) {
      const coin = new THREE.Mesh(
        new THREE.CylinderGeometry(0.5, 0.5, 0.2, 20),
        new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0x554400 })
      );
      coin.rotation.x = Math.PI / 2;
      coin.position.set(x, y, z);
      coin.castShadow = true;
      scene.add(coin);
      coins.push(coin);
    }

    createCoin(0, 2.6, -18);
    createCoin(0, 4.6, -26);
    createCoin(4, 6.6, -34);
    createCoin(-4, 8.6, -42);
    createCoin(0, 10.6, -50);
    createCoin(6, 12.6, -58);
    createCoin(0, 14.7, -66);

    let score = 0;
    const ui = document.getElementById("ui");

    function updateUI() {
      ui.innerHTML = `
        <b>Mini Roblox Like</b><br>
        Score : ${score}<br>
        ZQSD / WASD = bouger<br>
        Espace = sauter<br>
        Shift = courir<br>
        R = reset position
      `;
    }
    updateUI();

    function checkGroundAndPlatforms(px, py, pz) {
      let grounded = false;
      let floorY = 0;

      // Sol principal
      if (py <= 0) {
        grounded = true;
        floorY = 0;
      }

      // Plateformes
      for (const c of colliders) {
        const insideX = px > c.minX - 0.6 && px < c.maxX + 0.6;
        const insideZ = pz > c.minZ - 0.6 && pz < c.maxZ + 0.6;
        const topY = c.maxY;

        if (insideX && insideZ) {
          if (py >= topY - 0.4 && py <= topY + 0.5 && velocityY <= 0) {
            grounded = true;
            if (topY > floorY) floorY = topY;
          }
        }
      }

      return { grounded, floorY };
    }

    function updatePlayer() {
      const speed = keys["shift"] ? runSpeed : walkSpeed;

      let moveX = 0;
      let moveZ = 0;

      if (keys["z"] || keys["w"]) moveZ -= 1;
      if (keys["s"]) moveZ += 1;
      if (keys["q"] || keys["a"]) moveX -= 1;
      if (keys["d"]) moveX += 1;

      const len = Math.hypot(moveX, moveZ);
      if (len > 0) {
        moveX /= len;
        moveZ /= len;

        const forwardX = Math.sin(yaw);
        const forwardZ = Math.cos(yaw);
        const rightX = Math.sin(yaw + Math.PI / 2);
        const rightZ = Math.cos(yaw + Math.PI / 2);

        player.position.x += (forwardX * moveZ + rightX * moveX) * speed;
        player.position.z += (forwardZ * moveZ + rightZ * moveX) * speed;

        const lookAngle = Math.atan2(
          (forwardX * moveZ + rightX * moveX),
          (forwardZ * moveZ + rightZ * moveX)
        );
        player.rotation.y = lookAngle;
      }

      if ((keys[" "] || keys["space"]) && onGround) {
        velocityY = jumpPower;
        onGround = false;
      }

      velocityY -= gravity;
      player.position.y += velocityY;

      const groundState = checkGroundAndPlatforms(
        player.position.x,
        player.position.y,
        player.position.z
      );

      if (groundState.grounded && velocityY <= 0) {
        player.position.y = groundState.floorY;
        velocityY = 0;
        onGround = true;
      } else {
        onGround = false;
      }

      // Limites du monde
      player.position.x = Math.max(-90, Math.min(90, player.position.x));
      player.position.z = Math.max(-90, Math.min(90, player.position.z));

      // Respawn si tombe
      if (player.position.y < -30) {
        player.position.set(0, 0, 8);
        velocityY = 0;
      }
    }

    function updateCamera() {
      const target = new THREE.Vector3(
        player.position.x,
        player.position.y + cameraHeight,
        player.position.z
      );

      const offset = new THREE.Vector3(
        Math.sin(yaw) * Math.cos(pitch) * cameraDistance,
        Math.sin(pitch) * cameraDistance + 1.5,
        Math.cos(yaw) * Math.cos(pitch) * cameraDistance
      );

      camera.position.copy(target).add(offset);
      camera.lookAt(target);
    }

    function updateCoins(time) {
      for (let i = coins.length - 1; i >= 0; i--) {
        const coin = coins[i];
        coin.rotation.z += 0.03;
        coin.position.y += Math.sin(time * 0.003 + i) * 0.005;

        const dist = coin.position.distanceTo(
          new THREE.Vector3(
            player.position.x,
            player.position.y + 2,
            player.position.z
          )
        );

        if (dist < 1.2) {
          scene.remove(coin);
          coins.splice(i, 1);
          score++;
          updateUI();
        }
      }
    }

    function animateCharacter(time) {
      const moving =
        keys["z"] || keys["w"] || keys["q"] || keys["a"] || keys["s"] || keys["d"];

      if (moving && onGround) {
        const swing = Math.sin(time * 0.015) * 0.6;
        armL.rotation.x = swing;
        armR.rotation.x = -swing;
        legL.rotation.x = -swing;
        legR.rotation.x = swing;
      } else {
        armL.rotation.x *= 0.8;
        armR.rotation.x *= 0.8;
        legL.rotation.x *= 0.8;
        legR.rotation.x *= 0.8;
      }
    }

    function animate(time) {
      requestAnimationFrame(animate);
      updatePlayer();
      updateCamera();
      updateCoins(time);
      animateCharacter(time);
      renderer.render(scene, camera);
    }

    animate(0);

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
